type Query {
  company(id: ID): Company
  job(id: ID!): Job
  jobs(limit: Int, offset: Int): JobSublist
}

type JobSublist {
  items: [Job!]!
  totalCount: Int!
}

type Mutation {
  createJob(input: CreateJobInput): Job
  deleteJob(id: ID!): Job
  updateJob(input: UpdateJobInput): Job
}

type Company {
  id: ID!
  name: String!
  description: String
  jobs: [Job!]!
}

#The below lines represent a documentation comment. The current line is only a developer comment.
"""
Represents the __job ad__ posted to our board.
"""
type Job {
  id: ID!
  """
  The __date__ when the job was published, in ISO-8601 format. E.g. `2026-12-31`.
  """
  date: String!
  title: String!
  company: Company!
  description: String
}

input CreateJobInput {
  title: String!
  description: String
}

input UpdateJobInput {
  id: ID!
  title: String!
  description: String
}

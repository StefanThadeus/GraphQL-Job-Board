type Query {
  company(id: ID): Company
  job(id: ID!): Job
  jobs: [Job!]
}

type Company {
  id: ID!
  name: String!
  description: String
}

#The below lines represent a documentation comment. The current line is only a developer comment.
"""
Represents the __job ad__ posted to our board.
"""
type Job {
  id: ID!
  """
  The __date__ when the job was published, in ISO-8601 format. E.g. `2026-12-31`.
  """
  date: String!
  title: String!
  company: Company!
  description: String
}
